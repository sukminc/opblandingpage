<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="circleBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1e1640"/>
      <stop offset="100%" stop-color="#0D0D11"/>
    </radialGradient>
  </defs>

  <!-- ── Badge mark (left) ── -->
  <circle cx="100" cy="100" r="96" stroke="#8B5CF6" stroke-width="0.5" fill="none" opacity="0.18"/>
  <circle cx="100" cy="100" r="93" stroke="#8B5CF6" stroke-width="0.8" fill="none" opacity="0.28"/>
  <circle cx="100" cy="100" r="90" stroke="#8B5CF6" stroke-width="1.2" fill="none" opacity="0.45"/>
  <circle cx="100" cy="100" r="87" stroke="#8B5CF6" stroke-width="3" fill="url(#circleBg)" filter="url(#glow)"/>
  <text x="100" y="118"
    font-family="Poppins, Arial Black, Arial, sans-serif"
    font-weight="700" font-size="68" fill="#FFFFFF"
    text-anchor="middle" letter-spacing="-2">1%</text>

  <!-- ── Divider ── -->
  <line x1="212" y1="48" x2="212" y2="152" stroke="#8B5CF6" stroke-width="1" opacity="0.35"/>

  <!-- ── Wordmark (right) ── -->
  <!-- "onepercentbetter" — top line -->
  <text x="228" y="96"
    font-family="Poppins, Arial, sans-serif"
    font-weight="700" font-size="32" fill="#FFFFFF"
    text-anchor="start" letter-spacing="-0.5">onepercentbetter</text>

  <!-- Tagline — bottom line -->
  <text x="230" y="128"
    font-family="Poppins, Arial, sans-serif"
    font-weight="400" font-size="15" fill="#8B5CF6"
    text-anchor="start" letter-spacing="3">FIND THE EDGE</text>
</svg>
